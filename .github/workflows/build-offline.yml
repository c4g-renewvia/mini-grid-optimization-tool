name: Build offline distribution

on:
  push:
    branches: [feature/offline-mode]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: uv sync (backend)
        working-directory: backend
        run: uv sync

      - name: Build solver binary
        working-directory: backend
        shell: bash
        run: bash build-solver.sh

      - name: Build Electron app
        run: pnpm run electron:build
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: minigrid-tool-${{ matrix.os }}
          path: |
            release/electron/*.dmg
            release/electron/*.AppImage
            release/electron/*.exe
          if-no-files-found: warn

      - name: Attach to release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/electron/*.dmg
            release/electron/*.AppImage
            release/electron/*.exe
