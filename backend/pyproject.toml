    "pillow==12.2.0",
    "platformdirs>=4.0",
    "pluggy==1.6.0",
    "pydantic==2.12.5",
    "pydantic-core==2.41.5",
    "pygments==2.20.0",
    "pykml==0.2.0",
    "pyparsing==3.3.2",
    "pytest==9.0.2",
