<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Mini-Grid — Starting</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
      }
      body {
        background: #18181b;
        color: #f4f4f5;
        font-family:
          system-ui,
          -apple-system,
          'Segoe UI',
          sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .center {
        text-align: center;
        max-width: 480px;
        padding: 32px;
      }
      .spinner {
        width: 48px;
        height: 48px;
        margin: 0 auto 24px;
        border: 4px solid #3f3f46;
        border-top-color: #6366f1;
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      h1 {
        margin: 0 0 12px;
        font-size: 20px;
        font-weight: 600;
      }
      p {
        margin: 0;
        color: #a1a1aa;
        line-height: 1.5;
        font-size: 14px;
      }
      .err {
        display: none;
        margin-top: 16px;
        padding: 12px 16px;
        background: #3f1d1d;
        border: 1px solid #7f1d1d;
        border-radius: 6px;
        color: #fecaca;
        font-family: ui-monospace, monospace;
        font-size: 12px;
        text-align: left;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .has-err .spinner {
        display: none;
      }
      .has-err .err {
        display: block;
      }
      .hint {
        display: block;
        margin-top: 16px;
        font-size: 12px;
        color: #71717a;
      }
    </style>
  </head>
  <body>
    <div class="center" id="root">
      <div class="spinner"></div>
      <h1 id="title">Starting Mini-Grid</h1>
      <p id="status">
        Loading the solver. First launch can take up to a minute while the font
        cache is built.
      </p>
      <div class="err" id="err"></div>
      <span class="hint" id="hint">Logs at ~/Library/Logs/minigrid-solver/</span>
    </div>
  </body>
</html>
